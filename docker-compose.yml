version: "3.9"
# API keys are injected at runtime via env_file / environment (not baked into the image).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
    container_name: treatment-finder-backend
    ports:
      - "8000:8000"
    volumes:
      - treatment_finder_db:/app/treatment_finder.db
    networks:
      - platform_net
    restart: unless-stopped

networks:
  platform_net:
    name: treatment-finder-platform-net

volumes:
  treatment_finder_db:
