services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
    container_name: treatment-finder-backend
    ports:
      - "8000:8000"
    volumes:
      - treatment_finder_db:/app/treatment_finder.db
    networks:
      - platform_net
    restart: unless-stopped

  frontend:
    image: treatment-finder-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: treatment-finder-frontend
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "3000:3000"
    networks:
      - platform_net
    restart: unless-stopped

networks:
  platform_net:
    name: treatment-finder-platform-net

volumes:
  treatment_finder_db:
